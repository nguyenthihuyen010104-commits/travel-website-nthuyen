<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Đăng nhập</title>

        <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .login-box{
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }
    </style>
    </head>
    <body>

        <div class="login-box">
            <h2>FORM ĐĂNG NHẬP</h2>

            <form action="process_login.php" method="POST">

                <label>Tên đăng nhập</label>
                <input type="text" name="username">

                <label>Mật khẩu</label>
                <input type="password" name="password">

                <button type="submit">Đăng nhập</button>

            </form>
        </div>

    </body>
</html>
