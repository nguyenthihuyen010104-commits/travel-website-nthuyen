<!DOCTYPE html>
<html>
    <head>
        <title>Tour</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <h1>Xin chào thế giới</h1>

        <h2 class="title">Danh sách tour</h2>

        <div class="cards">

            <div class="card">
                <h3>Đà Lạt</h3>
                <p>Mát mẻ quanh năm</p>
                <p>Giá: 2.000.000 VNĐ</p>
                <button onclick="chonTour('Đà Lạt')" class="btn">Chọn
                    tour</button>
            </div>

            <div class="card">
                <h3>Phú Quốc</h3>
                <p>Biển đẹp</p>
                <p>Giá: 3.000.000 VNĐ</p>
                <button onclick="chonTour('Phú Quốc')" class="btn">Chọn
                    tour</button>
            </div>

            <div class="card">
                <h3>Hà Nội</h3>
                <p>Văn hóa lâu đời</p>
                <p>Giá: 1.500.000 VNĐ</p>
                <button onclick="chonTour('Hà Nội')" class="btn">Chọn
                    tour</button>
            </div>

            <div class="card">
                <h3>Nha Trang</h3>
                <p>Biển xanh</p>
                <p>Giá: 2.500.000 VNĐ</p>
                <button onclick="chonTour('Nha Trang')" class="btn">Chọn
                    tour</button>
            </div>

        </div>

        <p id="thongbao"></p>

        <script src="js/script.js"></script>
    </body>
</html>
